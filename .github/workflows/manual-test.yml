name: Count Stores and Categories (Manual)

on:
  workflow_dispatch:
    inputs:
      store_city:
        description: "Optional city filter for stores (e.g. Wellington)"
        required: false
        default: ""

jobs:
  count-metrics:
    runs-on: ubuntu-latest
    env:
      SCRAPING_PROVIDER_API_KEY: ${{ secrets.SCRAPING_PROVIDER_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate ScrapingBee key
        run: |
          if [ -z "${SCRAPING_PROVIDER_API_KEY:-}" ]; then
            echo "SCRAPING_PROVIDER_API_KEY is not set in repository secrets"
            exit 1
          fi

      - name: Debug - inspect fulfillment page HTML
        continue-on-error: true
        run: |
          python scraper.py \
            --provider scrapingbee \
            --url "https://www.newworld.co.nz/shop/fulfillment" \
            --render-wait-ms 10000 \
            --count-stores \
            || true

      - name: Count stores via ScrapingBee
        id: count_stores
        run: |
          set -euo pipefail
          city='${{ inputs.store_city }}'
          city_args=()
          if [ -n "$city" ]; then
            echo "Applying city filter: $city"
            city_args=(--store-city "$city")
          fi
          output=$(python scraper.py \
            --provider scrapingbee \
            --url "https://www.newworld.co.nz/shop/fulfillment" \
            --render-wait-ms 12000 \
            --count-stores \
            "${city_args[@]}")
          printf '%s\n' "$output"
          store_count=$(printf '%s\n' "$output" | sed -n 's/^Total number of stores: \([0-9][0-9]*\)$/\1/p' | tail -1)
          if [ -z "$store_count" ]; then
            echo "Failed to parse store count"
            exit 1
          fi
          echo "store_count=$store_count" >> "$GITHUB_OUTPUT"

      - name: Count category pages via ScrapingBee
        id: count_category_pages
        run: |
          set -euo pipefail
          city='${{ inputs.store_city }}'
          city_args=()
          if [ -n "$city" ]; then
            echo "Applying city filter: $city"
            city_args=(--store-city "$city")
          fi
          output=$(python scraper.py \
            --provider scrapingbee \
            --url "https://www.newworld.co.nz/" \
            --render-wait-ms 8000 \
            --discover-category-urls \
            --count-category-pages \
            "${city_args[@]}")
          printf '%s\n' "$output"
          category_count=$(printf '%s\n' "$output" | sed -n 's/^Discovered \([0-9][0-9]*\) unique category URLs$/\1/p' | tail -1)
          total_pages=$(printf '%s\n' "$output" | sed -n 's/^Total category pages across all categories: \([0-9][0-9]*\)$/\1/p' | tail -1)
          if [ -z "$category_count" ] || [ -z "$total_pages" ]; then
            echo "Failed to parse category/page counts"
            exit 1
          fi
          echo "category_count=$category_count" >> "$GITHUB_OUTPUT"
          echo "total_pages=$total_pages" >> "$GITHUB_OUTPUT"

      - name: Print multiplied total
        run: |
          set -euo pipefail
          stores='${{ steps.count_stores.outputs.store_count }}'
          categories='${{ steps.count_category_pages.outputs.category_count }}'
          pages='${{ steps.count_category_pages.outputs.total_pages }}'
          total=$((stores * pages))
          echo "Stores: $stores"
          echo "Categories: $categories"
          echo "Pages: $pages"
          echo "Total multiplied amount (stores * pages): $total"
