name: Count Stores and Categories (Manual)

on:
  workflow_dispatch:

jobs:
  count-metrics:
    runs-on: ubuntu-latest
    env:
      SCRAPING_PROVIDER_API_KEY: ${{ secrets.SCRAPING_PROVIDER_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate ScrapingBee key
        run: |
          if [ -z "${SCRAPING_PROVIDER_API_KEY:-}" ]; then
            echo "SCRAPING_PROVIDER_API_KEY is not set in repository secrets"
            exit 1
          fi

      - name: Count stores via ScrapingBee
        run: |
          set -euo pipefail
          python scraper.py \
            --provider scrapingbee \
            --url "https://www.newworld.co.nz/shop/fulfillment" \
            --render-wait-ms 8000 \
            --count-stores

      - name: Count categories via ScrapingBee
        run: |
          set -euo pipefail
          python scraper.py \
            --provider scrapingbee \
            --url "https://www.newworld.co.nz/" \
            --render-wait-ms 8000 \
            --discover-category-urls \
            --count-only
