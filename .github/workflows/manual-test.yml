name: Count Retailer Metrics (Manual)

on:
  workflow_dispatch:
    inputs:
      site_profile:
        description: "Retailer selector profile: auto, newworld, paknsave, woolworths"
        required: false
        default: "auto"
      provider:
        description: "Provider to use for the check. `floppydata` is the default managed option; switch to `playwright` for the lowest-credit path if preferred."
        required: false
        default: "floppydata"
      store_city:
        description: "Optional city filter for stores (e.g. Wellington)"
        required: false
        default: ""
      include_category_pages:
        description: "Also count category pages and print stores * pages"
        required: false
        default: false
        type: boolean
      run_debug_fetch:
        description: "Run the extra debug fetch before counting"
        required: false
        default: false
        type: boolean
      debug_url:
        description: "Optional URL for the debug fetch (leave blank to use a retailer-specific default)"
        required: false
        default: ""

jobs:
  count-metrics:
    runs-on: ubuntu-latest
    env:
      ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY }}
      FLOPPYDATA_API_KEY: ${{ secrets.FLOPPYDATA_API_KEY }}
      PROVIDER: ${{ inputs.provider }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        if: ${{ inputs.provider == 'playwright' }}
        run: |
          python -m playwright install firefox
          python -m playwright install-deps firefox

      - name: Resolve retailer defaults
        run: |
          set -euo pipefail
          site='${{ inputs.site_profile }}'
          debug_url='${{ inputs.debug_url }}'

          detect_profile() {
            case "$1" in
              *woolworths.co.nz*|*countdown.co.nz*) echo "woolworths" ;;
              *paknsave.co.nz*) echo "paknsave" ;;
              *newworld.co.nz*) echo "newworld" ;;
              *) echo "newworld" ;;
            esac
          }

          if [ -n "$debug_url" ] && [ "$site" = "auto" ]; then
            site="$(detect_profile "$debug_url")"
          fi

          case "$site" in
            woolworths)
              store_url='https://www.woolworths.co.nz/shop'
              category_url='https://www.woolworths.co.nz/shop'
              ;;
            paknsave)
              store_url='https://www.paknsave.co.nz/shop/fulfillment'
              category_url='https://www.paknsave.co.nz/'
              ;;
            *)
              site='newworld'
              store_url='https://www.newworld.co.nz/shop/fulfillment'
              category_url='https://www.newworld.co.nz/'
              ;;
          esac

          if [ -z "$debug_url" ]; then
            debug_url="$store_url"
          fi

          echo "SITE_PROFILE=$site" >> "$GITHUB_ENV"
          echo "STORE_COUNT_URL=$store_url" >> "$GITHUB_ENV"
          echo "CATEGORY_COUNT_URL=$category_url" >> "$GITHUB_ENV"
          echo "DEBUG_URL=$debug_url" >> "$GITHUB_ENV"

      - name: Validate ZenRows key
        if: ${{ inputs.provider == 'zenrows' }}
        run: |
          if [ -z "${ZENROWS_API_KEY:-}" ]; then
            echo "ZENROWS_API_KEY is not set in repository secrets"
            exit 1
          fi

      - name: Validate FloppyData key
        if: ${{ inputs.provider == 'floppydata' }}
        run: |
          if [ -z "${FLOPPYDATA_API_KEY:-}" ]; then
            echo "FLOPPYDATA_API_KEY is not set in repository secrets"
            exit 1
          fi

      - name: Debug - inspect target page HTML
        if: ${{ inputs.run_debug_fetch }}
        continue-on-error: true
        run: |
          set -euo pipefail
          debug_url="${DEBUG_URL}"
          echo "Debug URL: $debug_url"
          echo "Provider: ${PROVIDER}"
          echo "Site profile: ${SITE_PROFILE}"

          if [[ "$debug_url" == *"/shop/category/"* || "$debug_url" == *"/shop/browse/"* ]]; then
            python scraper.py \
              --provider "${PROVIDER}" \
              --site-profile "${SITE_PROFILE}" \
              --url "$debug_url" \
              --render-wait-ms 12000 \
              --count-category-pages \
              --count-only \
              || true
          elif [[ "$debug_url" == *"/shop/fulfillment"* || "$debug_url" == *"/shop"* ]]; then
            python scraper.py \
              --provider "${PROVIDER}" \
              --site-profile "${SITE_PROFILE}" \
              --url "$debug_url" \
              --render-wait-ms 10000 \
              --count-stores \
              || true
          else
            python scraper.py \
              --provider "${PROVIDER}" \
              --site-profile "${SITE_PROFILE}" \
              --url "$debug_url" \
              --render-wait-ms 10000 \
              --discover-category-urls \
              --count-only \
              || true
          fi

      - name: Count stores
        id: count_stores
        run: |
          set -euo pipefail
          city='${{ inputs.store_city }}'
          city_args=()
          if [ -n "$city" ]; then
            echo "Applying city filter: $city"
            city_args=(--store-city "$city")
          fi
          set +e
          output=$(python scraper.py \
            --provider "${PROVIDER}" \
            --site-profile "${SITE_PROFILE}" \
            --url "${STORE_COUNT_URL}" \
            --render-wait-ms 12000 \
            --count-stores \
            "${city_args[@]}")
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          store_count=$(printf '%s\n' "$output" | sed -n 's/^Total number of stores: \([0-9][0-9]*\)$/\1/p' | tail -1)
          if [ -z "$store_count" ]; then
            echo "Failed to parse store count"
            exit 1
          fi
          echo "store_count=$store_count" >> "$GITHUB_OUTPUT"

      - name: Count category pages
        if: ${{ inputs.include_category_pages }}
        id: count_category_pages
        run: |
          set -euo pipefail
          city='${{ inputs.store_city }}'
          city_args=()
          if [ -n "$city" ]; then
            echo "Applying city filter: $city"
            city_args=(--store-city "$city")
          fi
          set +e
          output=$(python scraper.py \
            --provider "${PROVIDER}" \
            --site-profile "${SITE_PROFILE}" \
            --url "${CATEGORY_COUNT_URL}" \
            --render-wait-ms 8000 \
            --discover-category-urls \
            --count-category-pages \
            "${city_args[@]}")
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          category_count=$(printf '%s\n' "$output" | sed -n 's/^Discovered \([0-9][0-9]*\) unique category URLs$/\1/p' | tail -1)
          total_pages=$(printf '%s\n' "$output" | sed -n 's/^Total category pages across all categories: \([0-9][0-9]*\)$/\1/p' | tail -1)
          if [ -z "$category_count" ] || [ -z "$total_pages" ]; then
            echo "Failed to parse category/page counts"
            exit 1
          fi
          echo "category_count=$category_count" >> "$GITHUB_OUTPUT"
          echo "total_pages=$total_pages" >> "$GITHUB_OUTPUT"

      - name: Print multiplied total
        if: ${{ inputs.include_category_pages }}
        run: |
          set -euo pipefail
          stores='${{ steps.count_stores.outputs.store_count }}'
          categories='${{ steps.count_category_pages.outputs.category_count }}'
          pages='${{ steps.count_category_pages.outputs.total_pages }}'
          total=$((stores * pages))
          echo "Stores: $stores"
          echo "Categories: $categories"
          echo "Pages: $pages"
          echo "Total multiplied amount (stores * pages): $total"
