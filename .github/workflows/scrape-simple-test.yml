name: Simple Scraper Test

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Test URL (use a simple site without Cloudflare)'
        required: false
        default: 'https://httpbin.org/html'

jobs:
  simple-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2t64 libasound2 || true
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 \
            libdbus-glib-1-2 \
            libxt6 \
            libx11-xcb1 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright-stealth
      
      - name: Install Playwright system dependencies and browsers
        run: |
          python -m playwright install-deps firefox
          python -m playwright install firefox
      
      - name: Set up virtual display
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x800x24 &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV
      
      - name: Run simple test
        env:
          DISPLAY: :99
        run: |
          URL="${{ github.event.inputs.url || 'https://httpbin.org/html' }}"
          
          echo "Testing scraper with simple site: $URL"
          
          # Test with very simple selectors for a basic HTML page
          python scraper.py \
            --url "$URL" \
            --product-selector "body" \
            --name-selector "h1" \
            --price-selector "p" \
            --image-selector "body" \
            --limit 1 \
            --headless-only \
            --output test_output.json \
            --delay-seconds 1
          
          if [ -f "test_output.json" ]; then
            echo "✅ Scraper test successful!"
            echo "Output:"
            cat test_output.json
          else
            echo "⚠️  No output file created (might be expected for test site)"
          fi
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test_output.json
          retention-days: 1