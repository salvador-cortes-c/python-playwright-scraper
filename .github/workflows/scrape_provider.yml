name: Daily Product Scrape

'on':
  schedule:
    # Run at 2 AM UTC daily (adjust for your timezone)
    - cron: '0 2 * * *'
  
  # Allow manual triggering from GitHub UI
  workflow_dispatch:
    inputs:
      url:
        description: 'Optional start/category URL. Leave blank to use a low-credit default for the selected retailer profile.'
        required: false
        default: ''
      site_profile:
        description: 'Retailer selector profile: auto, newworld, paknsave, woolworths'
        required: false
        default: 'auto'
      provider:
        description: 'Scraping provider/engine. `oxylabs` is the default managed provider; switch to `playwright` for the lowest-credit path or to another paid provider if needed.'
        required: false
        default: 'oxylabs'
      limit:
        description: 'Max products to scrape'
        required: false
        default: '20'
      max_pages:
        description: 'Max resolved pages to scrape'
        required: false
        default: '3'
      discover_category_urls:
        description: 'Discover all category URLs from the start URL before crawling pages'
        required: false
        default: 'false'
      count_only:
        description: 'Only resolve/count URLs, do not scrape products'
        required: false
        default: 'false'
      count_stores:
        description: 'Count number of stores via fulfillment page and exit'
        required: false
        default: 'false'
      count_categories:
        description: 'Count number of categories from home page and exit'
        required: false
        default: 'false'
      count_category_pages:
        description: 'Discover and print the number of pages for each category'
        required: false
        default: 'false'
      scrape_all_stores:
        description: 'Playwright mode: scrape across all discovered stores'
        required: false
        default: 'false'
      store_city:
        description: 'Optional city filter for stores (e.g. Wellington)'
        required: false
        default: ''
      max_stores:
        description: 'Optional cap on number of stores when scrape_all_stores=true'
        required: false
        default: ''
      persist_db:
        description: 'Persist products and snapshots to PostgreSQL'
        required: false
        default: 'false'
      store_name:
        description: "Store name for Playwright mode (for example: New World Karori, Pak'nSave Albany, Woolworths Grey Lynn)"
        required: false
        default: ''

jobs:
  scrape:
    name: ${{ matrix.label }}
    if: >-
      (github.event_name == 'workflow_dispatch' && matrix.mode == 'manual') ||
      (github.event_name == 'schedule' && matrix.mode == 'schedule')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - label: Manual / input-driven run
            mode: manual
            artifact_suffix: manual
            site_profile: ''
            url: ''
            store_name: ''
            provider: ''
            persist_db: ''
          - label: New World Karori - Beer, Wine & Cider
            mode: schedule
            artifact_suffix: newworld-karori-beer-wine-cider
            site_profile: newworld
            url: https://www.newworld.co.nz/shop/category/beer-wine-and-cider?pg=1
            store_name: New World Karori
            provider: oxylabs
            persist_db: 'true'
          - label: PAKn'SAVE Kilbirnie - Beer, Wine & Cider
            mode: schedule
            artifact_suffix: paknsave-kilbirnie-beer-wine-cider
            site_profile: paknsave
            url: https://www.paknsave.co.nz/shop/category/beer-wine-and-cider?pg=1
            store_name: PAKn'SAVE Kilbirnie
            provider: oxylabs
            persist_db: 'true'
          - label: Karori Woolworths - Beer & Wine
            mode: schedule
            artifact_suffix: karori-woolworths-beer-wine
            site_profile: woolworths
            url: https://www.woolworths.co.nz/shop/browse/beer-wine?page=1&size=48
            store_name: Karori Woolworths
            provider: oxylabs
            persist_db: 'true'
    
    steps:
      # Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      # Install Python dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        if: ${{ github.event.inputs.provider == 'playwright' }}
        run: |
          python -m playwright install firefox
          python -m playwright install-deps firefox
      
      - name: Run scraper
        env:
          SCRAPING_PROVIDER_API_KEY: ${{ secrets.SCRAPING_PROVIDER_API_KEY }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          CRAWLBASE_TOKEN: ${{ secrets.CRAWLBASE_TOKEN }}
          ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY }}
          FLOPPYDATA_API_KEY: ${{ secrets.FLOPPYDATA_API_KEY }}
          OXYLABS_API_KEY: ${{ secrets.OXYLABS_API_KEY }}
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          URL="${{ matrix.url || github.event.inputs.url || '' }}"
          SITE_PROFILE="${{ matrix.site_profile || github.event.inputs.site_profile || 'auto' }}"
          PROVIDER="${{ matrix.provider || github.event.inputs.provider || 'oxylabs' }}"
          LIMIT="${{ github.event.inputs.limit || '20' }}"
          MAX_PAGES="${{ github.event.inputs.max_pages || '3' }}"
          DISCOVER_CATEGORY_URLS="${{ github.event.inputs.discover_category_urls || 'false' }}"
          COUNT_ONLY="${{ github.event.inputs.count_only || 'false' }}"
          COUNT_STORES="${{ github.event.inputs.count_stores || 'false' }}"
          COUNT_CATEGORIES="${{ github.event.inputs.count_categories || 'false' }}"
          COUNT_CATEGORY_PAGES="${{ github.event.inputs.count_category_pages || 'false' }}"
          SCRAPE_ALL_STORES="${{ github.event.inputs.scrape_all_stores || 'false' }}"
          STORE_CITY="${{ github.event.inputs.store_city || '' }}"
          MAX_STORES="${{ github.event.inputs.max_stores || '' }}"
          PERSIST_DB="${{ matrix.persist_db || github.event.inputs.persist_db || 'false' }}"
          STORE_NAME="${{ matrix.store_name || github.event.inputs.store_name || '' }}"

          detect_profile() {
            case "$1" in
              *woolworths.co.nz*|*countdown.co.nz*) echo "woolworths" ;;
              *paknsave.co.nz*) echo "paknsave" ;;
              *newworld.co.nz*) echo "newworld" ;;
              *) echo "newworld" ;;
            esac
          }

          if [ -n "$URL" ] && [ "$SITE_PROFILE" = "auto" ]; then
            SITE_PROFILE="$(detect_profile "$URL")"
          fi

          case "$SITE_PROFILE" in
            woolworths)
              DEFAULT_URL="https://www.woolworths.co.nz/shop/browse/fruit-veg?page=1&size=48"
              STORE_COUNT_URL="https://www.woolworths.co.nz/shop"
              CATEGORY_COUNT_URL="https://www.woolworths.co.nz/shop"
              ;;
            paknsave)
              DEFAULT_URL="https://www.paknsave.co.nz/shop/category/fresh-foods-and-bakery/fruit-vegetables?pg=1"
              STORE_COUNT_URL="https://www.paknsave.co.nz/shop/fulfillment"
              CATEGORY_COUNT_URL="https://www.paknsave.co.nz/"
              ;;
            *)
              DEFAULT_URL="https://www.newworld.co.nz/shop/category/fruit-and-vegetables?pg=1"
              STORE_COUNT_URL="https://www.newworld.co.nz/shop/fulfillment"
              CATEGORY_COUNT_URL="https://www.newworld.co.nz/"
              ;;
          esac

          if [ -z "$URL" ]; then
            URL="$DEFAULT_URL"
          fi
          
          echo "Running scraper..."
          echo "Provider: $PROVIDER"
          echo "Site profile: $SITE_PROFILE"
          echo "URL: $URL"
          echo "Limit: $LIMIT"
          echo "Max pages: $MAX_PAGES"
          echo "Discover categories: $DISCOVER_CATEGORY_URLS"
          echo "Count only: $COUNT_ONLY"
          echo "Count stores: $COUNT_STORES"
          echo "Count categories: $COUNT_CATEGORIES"
          echo "Count category pages: $COUNT_CATEGORY_PAGES"
          echo "Scrape all stores: $SCRAPE_ALL_STORES"
          echo "Store city: ${STORE_CITY:-<none>}"
          echo "Persist DB: $PERSIST_DB"
          echo "Store name: ${STORE_NAME:-<none>}"

          if [ "$COUNT_STORES" = "true" ] || [ "$COUNT_CATEGORIES" = "true" ]; then
            echo "Running counting-only mode"
            STORE_COUNT=0
            CATEGORY_COUNT=0

            if [ "$COUNT_STORES" = "true" ]; then
              python scraper.py \
                --provider "$PROVIDER" \
                --site-profile "$SITE_PROFILE" \
                --url "$STORE_COUNT_URL" \
                --count-stores | tee /tmp/store_count.log
              STORE_COUNT=$(awk -F': ' '/^Total number of stores:/{print $2}' /tmp/store_count.log | tail -n 1)
              STORE_COUNT=${STORE_COUNT:-0}
            fi

            if [ "$COUNT_CATEGORIES" = "true" ]; then
              python scraper.py \
                --provider "$PROVIDER" \
                --site-profile "$SITE_PROFILE" \
                --url "$CATEGORY_COUNT_URL" \
                --discover-category-urls \
                --count-only | tee /tmp/category_count.log
              CATEGORY_COUNT=$(awk '/^Discovered [0-9]+ unique category URLs$/{print $2}' /tmp/category_count.log | tail -n 1)
              CATEGORY_COUNT=${CATEGORY_COUNT:-0}
            fi

            printf '{\n  "stores": %s,\n  "categories": %s\n}\n' "${STORE_COUNT}" "${CATEGORY_COUNT}" > counts.json

            echo "Count summary:"
            cat counts.json
            exit 0
          fi
          
          if [ "$PROVIDER" = "scrapingbee" ] && [ -z "$SCRAPING_PROVIDER_API_KEY" ]; then
            echo "❌ ERROR: SCRAPING_PROVIDER_API_KEY secret not set"
            echo ""
            echo "💡 How to set it:"
            echo "   1. Go to Repository Settings → Secrets and variables → Actions"
            echo "   2. Click 'New repository secret'"
            echo "   3. Name: SCRAPING_PROVIDER_API_KEY"
            echo "   4. Value: Your ScrapingBee API key"
            exit 1
          fi

          if [ "$PROVIDER" = "scraperapi" ] && [ -z "$SCRAPERAPI_KEY" ]; then
            echo "❌ ERROR: SCRAPERAPI_KEY secret not set"
            echo ""
            echo "💡 How to set it:"
            echo "   1. Go to Repository Settings → Secrets and variables → Actions"
            echo "   2. Click 'New repository secret'"
            echo "   3. Name: SCRAPERAPI_KEY"
            echo "   4. Value: Your ScraperAPI key"
            exit 1
          fi

          if [ "$PROVIDER" = "floppydata" ] && [ -z "$FLOPPYDATA_API_KEY" ]; then
            echo "❌ ERROR: FLOPPYDATA_API_KEY secret not set"
            echo ""
            echo "💡 How to set it:"
            echo "   1. Go to Repository Settings → Secrets and variables → Actions"
            echo "   2. Click 'New repository secret'"
            echo "   3. Name: FLOPPYDATA_API_KEY"
            echo "   4. Value: Your FloppyData API key"
            exit 1
          fi

          if [ "$PROVIDER" = "oxylabs" ] && [ -z "$OXYLABS_API_KEY" ] && { [ -z "$OXYLABS_USERNAME" ] || [ -z "$OXYLABS_PASSWORD" ]; }; then
            echo "❌ ERROR: Oxylabs credentials not set"
            echo ""
            echo "💡 How to set it:"
            echo "   1. Go to Repository Settings → Secrets and variables → Actions"
            echo "   2. Add either OXYLABS_API_KEY with value USERNAME:PASSWORD"
            echo "      or add both OXYLABS_USERNAME and OXYLABS_PASSWORD"
            exit 1
          fi

          if [ "$PERSIST_DB" = "true" ] && [ -z "$DATABASE_URL" ]; then
            echo "❌ ERROR: DATABASE_URL secret not set"
            echo ""
            echo "💡 How to set it:"
            echo "   1. Go to Repository Settings → Secrets and variables → Actions"
            echo "   2. Click 'New repository secret'"
            echo "   3. Name: DATABASE_URL"
            echo "   4. Value: postgresql://user:password@host:5432/dbname"
            exit 1
          fi

          CMD=(python scraper.py
            --provider "$PROVIDER"
            --site-profile "$SITE_PROFILE"
            --url "$URL"
            --limit "$LIMIT"
            --max-pages "$MAX_PAGES"
            --dedupe
            --output products.json
            --price-output price_snapshots.json
            --progress-file scrape_progress.json
            --resume
            --append-snapshots
            --flush-every-url
            --max-rate-limit-retries 2
            --rate-limit-wait-seconds 60
            --rate-limit-max-delay-seconds 300
            --max-retries 3
            --retry-base-delay-seconds 5
            --retry-max-delay-seconds 60
            --initial-delay-seconds 2
            --delay-seconds 3)

          if [ "$DISCOVER_CATEGORY_URLS" = "true" ]; then
            CMD+=(--discover-category-urls)
          fi

          if [ "$COUNT_ONLY" != "true" ]; then
            CMD+=(--crawl-category-pages)
          fi

          if [ "$COUNT_ONLY" = "true" ]; then
            CMD+=(--count-only)
          fi

          if [ "$COUNT_CATEGORY_PAGES" = "true" ]; then
            CMD+=(--count-category-pages)
          fi

          if [ -n "$STORE_NAME" ]; then
            CMD+=(--choose-store --store-name "$STORE_NAME")
          fi

          if [ "$SCRAPE_ALL_STORES" = "true" ]; then
            CMD+=(--scrape-all-stores)
          fi

          if [ -n "$STORE_CITY" ]; then
            CMD+=(--store-city "$STORE_CITY")
          fi

          if [ -n "$MAX_STORES" ]; then
            CMD+=(--max-stores "$MAX_STORES")
          fi

          if [ "$PERSIST_DB" = "true" ]; then
            CMD+=(--persist-db --database-url "$DATABASE_URL")
          fi

          printf 'Command: '
          printf '%q ' "${CMD[@]}"
          echo
          "${CMD[@]}"

      - name: Verify scrape produced data
        if: ${{ github.event_name == 'schedule' || github.event.inputs.count_only != 'true' }}
        run: |
          if [ ! -f "products.json" ]; then
            echo "❌ ERROR: products.json was not created"
            exit 1
          fi

          PRODUCT_COUNT=$(jq '. | length' products.json 2>/dev/null || echo "0")
          SNAPSHOT_COUNT=$(jq '. | length' price_snapshots.json 2>/dev/null || echo "0")

          echo "Verified products: $PRODUCT_COUNT"
          echo "Verified snapshots: $SNAPSHOT_COUNT"

          if [ "$PRODUCT_COUNT" -eq 0 ]; then
            echo "❌ ERROR: Scrape completed with 0 products. Check provider quota or the target URL."
            exit 1
          fi
      
      # Upload scraped data as artifact
      - name: Upload scraped data
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results-${{ matrix.artifact_suffix }}
          path: |
            products.json
            price_snapshots.json
            scrape_progress.json
            counts.json
          retention-days: 7
      
      # Create a summary of what was scraped
      - name: Create scrape summary
        if: always()
        run: |
          echo "## Scraping Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "counts.json" ]; then
            STORE_COUNT=$(jq '.stores // 0' counts.json 2>/dev/null || echo "0")
            CATEGORY_COUNT=$(jq '.categories // 0' counts.json 2>/dev/null || echo "0")
            echo "🏬 **Stores counted:** $STORE_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "🧺 **Categories counted:** $CATEGORY_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "products.json" ]; then
            PRODUCT_COUNT=$(jq '. | length' products.json 2>/dev/null || echo "0")
            echo "✅ **Products scraped:** $PRODUCT_COUNT" >> $GITHUB_STEP_SUMMARY
            if [ -f "price_snapshots.json" ]; then
              SNAPSHOT_COUNT=$(jq '. | length' price_snapshots.json 2>/dev/null || echo "0")
              echo "✅ **Price snapshots:** $SNAPSHOT_COUNT" >> $GITHUB_STEP_SUMMARY
            fi
            
            # Show sample product
            if [ "$PRODUCT_COUNT" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Sample product:**" >> $GITHUB_STEP_SUMMARY
              echo '```json' >> $GITHUB_STEP_SUMMARY
              jq '.[0] | {product_key: .product_key, name: .name, packaging_format: .packaging_format}' products.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Could not extract sample" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ **Products file not created**" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow run:** $GITHUB_RUN_ID" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Provider:** ${{ github.event.inputs.provider || 'oxylabs' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Site profile:** ${{ github.event.inputs.site_profile || 'auto' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "**Manual run with URL:** ${{ github.event.inputs.url || 'default' }}" >> $GITHUB_STEP_SUMMARY
          fi
