name: Database Maintenance

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose whether to inspect the DB, backfill missing links, backfill supermarkets, dedupe price snapshots, or report cross-store snapshots"
        required: true
        default: analyze
        type: choice
        options:
          - analyze
          - backfill
          - backfill-supermarkets
          - dedupe-snapshots
          - report-cross-store

jobs:
  database-maintenance:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install DB dependency
        run: |
          python -m pip install --upgrade pip
          pip install psycopg[binary]==3.2.9

      - name: Run DB SQL utility
        run: |
          python - <<'PY'
          import os
          import sys
          from pathlib import Path

          import psycopg

          action = "${{ inputs.action }}"
          if not os.getenv("DATABASE_URL"):
              raise SystemExit("DATABASE_URL secret is not set")

          # ── report-cross-store ──────────────────────────────────────────────
          # Returns the 20 most recently scraped products present in all three
          # supermarkets, formatted as a Markdown table for easy review.
          if action == "report-cross-store":
              sql = Path("db/recent_cross_store_snapshots.sql").read_text(encoding="utf-8")
              with psycopg.connect(os.environ["DATABASE_URL"]) as conn:
                  with conn.cursor() as cur:
                      cur.execute(sql)
                      rows = cur.fetchall()

              header = "| Product Name | Store | Price |"
              divider = "|---|---|---|"
              table_lines = [header, divider]
              for product_name, store, price in rows:
                  safe_name  = str(product_name).replace("|", "\\|")
                  safe_store = str(store).replace("|", "\\|")
                  safe_price = str(price).replace("|", "\\|")
                  table_lines.append(f"| {safe_name} | {safe_store} | {safe_price} |")

              table_md = "\n".join(table_lines)

              title = "## 🛒 20 Most Recent Cross-Store Price Snapshots\n"
              subtitle = (
                  "_Products present in all three supermarkets (New World, Pak'nSave, Woolworths), "
                  "ordered alphabetically by product name._\n"
              )
              full_report = f"{title}\n{subtitle}\n{table_md}\n"

              print(full_report)

              # Also write to the Actions step summary so it renders in the UI.
              summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
              if summary_path:
                  with open(summary_path, "a", encoding="utf-8") as fh:
                      fh.write(full_report)
              sys.exit(0)

          # ── generic SQL file runner ─────────────────────────────────────────
          file_map = {
              "analyze": Path("db/analyze_data_quality.sql"),
              "backfill": Path("db/backfill_product_categories.sql"),
              "backfill-supermarkets": Path("db/backfill_supermarkets.sql"),
              "dedupe-snapshots": Path("db/dedupe_price_snapshots.sql"),
          }
          sql_path = file_map[action]
          sql_text = sql_path.read_text(encoding="utf-8")
          statements = [stmt.strip() for stmt in sql_text.split(";") if stmt.strip()]

          print(f"Running {sql_path} against the configured DATABASE_URL")
          with psycopg.connect(os.environ["DATABASE_URL"], autocommit=True) as conn:
              with conn.cursor() as cur:
                  for index, statement in enumerate(statements, start=1):
                      print(f"\n--- statement {index} ---")
                      cur.execute(statement)
                      if cur.description:
                          columns = [col.name for col in cur.description]
                          rows = cur.fetchall()
                          print("columns:", columns)
                          for row in rows:
                              print(row)
                      else:
                          print("done")
          PY
