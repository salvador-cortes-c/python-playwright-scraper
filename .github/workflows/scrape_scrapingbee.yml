name: Daily Product Scrape

on:
  schedule:
    # Run at 2 AM UTC daily (adjust for your timezone)
    - cron: '0 2 * * *'
  
  # Allow manual triggering from GitHub UI
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to scrape (optional)'
        required: false
        default: 'https://www.newworld.co.nz/shop/category/fruit-and-vegetables?pg=1'
      provider:
        description: 'Scraping provider/engine: scrapingbee, scraperapi, crawlbase, zenrows, direct, playwright'
        required: false
        default: 'scrapingbee'
      limit:
        description: 'Max products to scrape'
        required: false
        default: '20'
      max_pages:
        description: 'Max resolved pages to scrape'
        required: false
        default: '3'
      discover_category_urls:
        description: 'Discover all category URLs from the start URL before crawling pages'
        required: false
        default: 'false'
      count_only:
        description: 'Only resolve/count URLs, do not scrape products'
        required: false
        default: 'false'
      count_stores:
        description: 'Count number of stores via fulfillment page and exit'
        required: false
        default: 'false'
      count_categories:
        description: 'Count number of categories from home page and exit'
        required: false
        default: 'false'
      store_name:
        description: 'Store name for Playwright mode (for example: New World Karori)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      # Install Python dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        if: ${{ github.event.inputs.provider == 'playwright' || github.event.inputs.count_stores == 'true' || github.event.inputs.count_categories == 'true' }}
        run: |
          python -m playwright install firefox
          python -m playwright install-deps firefox
      
      - name: Run scraper
        env:
          SCRAPING_PROVIDER_API_KEY: ${{ secrets.SCRAPING_PROVIDER_API_KEY }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          CRAWLBASE_TOKEN: ${{ secrets.CRAWLBASE_TOKEN }}
          ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY }}
        run: |
          URL="${{ github.event.inputs.url || 'https://www.newworld.co.nz/shop/category/fruit-and-vegetables?pg=1' }}"
          PROVIDER="${{ github.event.inputs.provider || 'scrapingbee' }}"
          LIMIT="${{ github.event.inputs.limit || '20' }}"
          MAX_PAGES="${{ github.event.inputs.max_pages || '3' }}"
          DISCOVER_CATEGORY_URLS="${{ github.event.inputs.discover_category_urls || 'false' }}"
          COUNT_ONLY="${{ github.event.inputs.count_only || 'false' }}"
          COUNT_STORES="${{ github.event.inputs.count_stores || 'false' }}"
          COUNT_CATEGORIES="${{ github.event.inputs.count_categories || 'false' }}"
          STORE_COUNT_URL="https://www.newworld.co.nz/shop/fulfillment"
          CATEGORY_COUNT_URL="https://www.newworld.co.nz/"
          STORE_NAME="${{ github.event.inputs.store_name || '' }}"
          
          echo "Running scraper..."
          echo "Provider: $PROVIDER"
          echo "URL: $URL"
          echo "Limit: $LIMIT"
          echo "Max pages: $MAX_PAGES"
          echo "Discover categories: $DISCOVER_CATEGORY_URLS"
          echo "Count only: $COUNT_ONLY"
          echo "Count stores: $COUNT_STORES"
          echo "Count categories: $COUNT_CATEGORIES"
          echo "Store name: ${STORE_NAME:-<none>}"

          if [ "$COUNT_STORES" = "true" ] || [ "$COUNT_CATEGORIES" = "true" ]; then
            echo "Running counting-only mode"
            STORE_COUNT=0
            CATEGORY_COUNT=0

            if [ "$COUNT_STORES" = "true" ]; then
              python scraper.py \
                --provider playwright \
                --url "$STORE_COUNT_URL" \
                --count-stores | tee /tmp/store_count.log
              STORE_COUNT=$(awk -F': ' '/^Total number of stores:/{print $2}' /tmp/store_count.log | tail -n 1)
              STORE_COUNT=${STORE_COUNT:-0}
            fi

            if [ "$COUNT_CATEGORIES" = "true" ]; then
              python scraper.py \
                --provider playwright \
                --url "$CATEGORY_COUNT_URL" \
                --discover-category-urls \
                --count-only | tee /tmp/category_count.log
              CATEGORY_COUNT=$(awk '/^Discovered [0-9]+ unique category URLs$/{print $2}' /tmp/category_count.log | tail -n 1)
              CATEGORY_COUNT=${CATEGORY_COUNT:-0}
            fi

            cat > counts.json <<EOF
            {
              "stores": ${STORE_COUNT},
              "categories": ${CATEGORY_COUNT}
            }
            EOF

            echo "Count summary:"
            cat counts.json
            exit 0
          fi
          
          if [ "$PROVIDER" != "playwright" ] && [ "$PROVIDER" != "direct" ] && [ -z "$SCRAPING_PROVIDER_API_KEY" ] && [ "$PROVIDER" = "scrapingbee" ]; then
            echo "❌ ERROR: SCRAPING_PROVIDER_API_KEY secret not set"
            echo ""
            echo "💡 How to set it:"
            echo "   1. Go to Repository Settings → Secrets and variables → Actions"
            echo "   2. Click 'New repository secret'"
            echo "   3. Name: SCRAPING_PROVIDER_API_KEY"
            echo "   4. Value: Your ScrapingBee API key"
            exit 1
          fi

          CMD=(python scraper.py
            --provider "$PROVIDER"
            --url "$URL"
            --limit "$LIMIT"
            --max-pages "$MAX_PAGES"
            --dedupe
            --output products.json
            --price-output price_snapshots.json
            --progress-file scrape_progress.json
            --resume
            --append-snapshots
            --flush-every-url
            --max-rate-limit-retries 2
            --rate-limit-wait-seconds 60
            --rate-limit-max-delay-seconds 300
            --max-retries 3
            --retry-base-delay-seconds 5
            --retry-max-delay-seconds 60
            --initial-delay-seconds 2
            --delay-seconds 3)

          if [ "$DISCOVER_CATEGORY_URLS" = "true" ]; then
            CMD+=(--discover-category-urls)
          fi

          if [ "$COUNT_ONLY" != "true" ]; then
            CMD+=(--crawl-category-pages)
          fi

          if [ "$COUNT_ONLY" = "true" ]; then
            CMD+=(--count-only)
          fi

          if [ -n "$STORE_NAME" ]; then
            CMD+=(--choose-store --store-name "$STORE_NAME")
          fi

          printf 'Command: '
          printf '%q ' "${CMD[@]}"
          echo
          "${CMD[@]}"
      
      # Upload scraped data as artifact
      - name: Upload scraped data
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results-scrapingbee
          path: |
            products.json
            price_snapshots.json
            scrape_progress.json
            counts.json
          retention-days: 7
      
      # Create a summary of what was scraped
      - name: Create scrape summary
        if: always()
        run: |
          echo "## Scraping Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "counts.json" ]; then
            STORE_COUNT=$(python - <<'PY'
import json
from pathlib import Path
data = json.loads(Path("counts.json").read_text())
print(data.get("stores", 0))
PY
)
            CATEGORY_COUNT=$(python - <<'PY'
import json
from pathlib import Path
data = json.loads(Path("counts.json").read_text())
print(data.get("categories", 0))
PY
)
            echo "🏬 **Stores counted:** $STORE_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "🧺 **Categories counted:** $CATEGORY_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "products.json" ]; then
            PRODUCT_COUNT=$(jq '. | length' products.json 2>/dev/null || echo "0")
            echo "✅ **Products scraped:** $PRODUCT_COUNT" >> $GITHUB_STEP_SUMMARY
            if [ -f "price_snapshots.json" ]; then
              SNAPSHOT_COUNT=$(jq '. | length' price_snapshots.json 2>/dev/null || echo "0")
              echo "✅ **Price snapshots:** $SNAPSHOT_COUNT" >> $GITHUB_STEP_SUMMARY
            fi
            
            # Show sample product
            if [ "$PRODUCT_COUNT" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Sample product:**" >> $GITHUB_STEP_SUMMARY
              echo '```json' >> $GITHUB_STEP_SUMMARY
              jq '.[0] | {product_key: .product_key, name: .name, packaging_format: .packaging_format}' products.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Could not extract sample" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ **Products file not created**" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow run:** $GITHUB_RUN_ID" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Provider:** ${{ github.event.inputs.provider || 'scrapingbee' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "**Manual run with URL:** ${{ github.event.inputs.url || 'default' }}" >> $GITHUB_STEP_SUMMARY
          fi