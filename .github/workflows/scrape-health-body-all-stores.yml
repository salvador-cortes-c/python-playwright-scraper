name: Scrape Health & Body - All Stores (Direct → Oxylabs)

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Provider override (direct or oxylabs)'
        required: false
        default: 'direct'

jobs:
  scrape-matrix:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          # New World: Direct HTTP (fastest) → Oxylabs fallback if blocked
          - label: New World Karori - Health & Body (All pages)
            site_profile: newworld
            url: https://www.newworld.co.nz/shop/category/health-body?pg=1
            store_name: New World Karori
            artifact_suffix: newworld-karori-health-body
            primary_provider: direct
            fallback_provider: oxylabs
          
          # Woolworths: Direct HTTP (fastest) → Oxylabs fallback if blocked
          - label: Woolworths Karori - Health & Body (All pages)
            site_profile: woolworths
            url: https://www.woolworths.co.nz/shop/browse/health-beauty?page=1&size=48
            store_name: Karori Woolworths
            artifact_suffix: woolworths-karori-health-body
            primary_provider: direct
            fallback_provider: oxylabs
          
          # PAK'nSAVE: Direct HTTP (fastest) → Oxylabs fallback if blocked
          - label: PAK'nSAVE Kilbirnie - Health & Body (All pages)
            site_profile: paknsave
            url: https://www.paknsave.co.nz/shop/category/health-and-body?pg=1
            store_name: PAKn'SAVE Kilbirnie
            artifact_suffix: paknsave-kilbirnie-health-body
            primary_provider: direct
            fallback_provider: oxylabs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Stagger parallel jobs to reduce database deadlock
        run: |
          # Add a small delay based on matrix index to prevent concurrent database writes
          # New World (index 0): 0s, Woolworths (index 1): 8s, PAK'nSAVE (index 2): 16s
          STAGGER_SECONDS=$(({{ strategy.job-index }} * 8))
          if [ $STAGGER_SECONDS -gt 0 ]; then
            echo "🕐 Waiting ${STAGGER_SECONDS}s to stagger database writes..."
            sleep $STAGGER_SECONDS
          fi

      - name: Run scraper with primary provider
        id: primary_run
        env:
          SCRAPING_PROVIDER_API_KEY: ${{ secrets.SCRAPING_PROVIDER_API_KEY }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          CRAWLBASE_TOKEN: ${{ secrets.CRAWLBASE_TOKEN }}
          ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY }}
          FLOPPYDATA_API_KEY: ${{ secrets.FLOPPYDATA_API_KEY }}
          OXYLABS_API_KEY: ${{ secrets.OXYLABS_API_KEY }}
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        continue-on-error: true
        run: |
          echo "🎯 Starting scrape with ${{ matrix.primary_provider }} for ${{ matrix.label }}..."
          python scraper.py \
            --url "${{ matrix.url }}" \
            --site-profile ${{ matrix.site_profile }} \
            --provider ${{ matrix.primary_provider }} \
            --store-name "${{ matrix.store_name }}" \
            --persist-db \
            --output products_${{ matrix.artifact_suffix }}.json \
            --price-output price_snapshots_${{ matrix.artifact_suffix }}.json \
            --limit 100 \
            --max-pages 1000 \
            --delay-seconds 0.0 \
            --delay-jitter-seconds 0.0
          echo "PRIMARY_SUCCESS=true" >> $GITHUB_ENV

      # Fallback to secondary provider if primary fails
      - name: Run scraper with fallback provider
        if: ${{ steps.primary_run.outcome == 'failure' }}
        env:
          SCRAPING_PROVIDER_API_KEY: ${{ secrets.SCRAPING_PROVIDER_API_KEY }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          CRAWLBASE_TOKEN: ${{ secrets.CRAWLBASE_TOKEN }}
          ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY }}
          FLOPPYDATA_API_KEY: ${{ secrets.FLOPPYDATA_API_KEY }}
          OXYLABS_API_KEY: ${{ secrets.OXYLABS_API_KEY }}
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "⚠️  ${{ matrix.primary_provider }} failed, falling back to ${{ matrix.fallback_provider }} for ${{ matrix.label }}..."
          python scraper.py \
            --url "${{ matrix.url }}" \
            --site-profile ${{ matrix.site_profile }} \
            --provider ${{ matrix.fallback_provider }} \
            --store-name "${{ matrix.store_name }}" \
            --persist-db \
            --output products_${{ matrix.artifact_suffix }}.json \
            --price-output price_snapshots_${{ matrix.artifact_suffix }}.json \
            --limit 100 \
            --max-pages 1000 \
            --delay-seconds 0.0 \
            --delay-jitter-seconds 0.0
          echo "PRIMARY_SUCCESS=false" >> $GITHUB_ENV

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_suffix }}
          path: |
            products_${{ matrix.artifact_suffix }}.json
            price_snapshots_${{ matrix.artifact_suffix }}.json
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          if [ "$PRIMARY_SUCCESS" = "true" ]; then
            echo "✅ ${{ matrix.label }} - Completed with Direct HTTP (fastest)"
          else
            echo "✅ ${{ matrix.label }} - Completed with Oxylabs (fallback)"
          fi

  completion-summary:
    name: Completion Summary
    runs-on: ubuntu-latest
    needs: scrape-matrix
    if: always()
    steps:
      - name: Summary
        run: |
          echo "✅ Health & Body scraping completed for all stores:"
          echo "  1. New World Karori"
          echo "  2. Woolworths Karori"
          echo "  3. PAK'nSAVE Kilbirnie"
          echo ""
          echo "📊 All data persisted to PostgreSQL"
          echo "🔄 Deduplication automatically ran post-scrape"
