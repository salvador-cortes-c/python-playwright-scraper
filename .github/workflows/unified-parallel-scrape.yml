name: Unified Parallel Supermarket Scrape

on:
  workflow_dispatch:
    inputs:
      supermarkets:
        description: 'Comma-separated list of supermarkets (newworld,paknsave,woolworths)'
        required: true
        default: 'newworld,paknsave,woolworths'
      category_names:
        description: 'Comma-separated list of category names (e.g., "Beer & Wine", "Health & Body"), or "all" to scrape every category'
        required: true
        default: 'Beer & Wine'
      number_of_pages:
        description: 'Number of pages to scrape per category ("all" for all pages, or specific number)'
        required: true
        default: 'all'
      store_names:
        description: 'Optional comma-separated store names (default stores will be used if empty)'
        required: false
        default: ''
      timeout_minutes:
        description: 'Per-job timeout in minutes (default: 120; increase for "all" categories across large sites)'
        required: false
        default: '120'

permissions:
  contents: read

jobs:
  setup:
    name: Setup Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate dynamic matrix from supermarkets input
        id: set-matrix
        run: |
          SUPERMARKETS="${{ github.event.inputs.supermarkets }}"

          # Configuration map for each supermarket
          declare -A SITE_PROFILE=( [newworld]="newworld" [paknsave]="paknsave" [woolworths]="woolworths" )
          declare -A DEFAULT_STORE=( [newworld]="New World Karori" [paknsave]="PAKn'SAVE Kilbirnie" [woolworths]="Karori Woolworths" )
          declare -A DEFAULT_URL=(
            [newworld]="https://www.newworld.co.nz/shop/category/beer-wine-and-cider?pg=1"
            [paknsave]="https://www.paknsave.co.nz/shop/category/beer-wine-and-cider?pg=1"
            [woolworths]="https://www.woolworths.co.nz/shop/browse/beer-wine?page=1&size=48"
          )
          # PAKn'SAVE and New World use --provider direct with automatic oxylabs fallback.
          # When direct is blocked by Cloudflare, the scraper automatically retries via Oxylabs.
          # Woolworths uses Playwright because its store-picker requires browser-based interaction.
          declare -A PROVIDER=( [newworld]="direct" [paknsave]="direct" [woolworths]="playwright" )

          INCLUDES="[]"
          IFS=',' read -ra SM_LIST <<< "$SUPERMARKETS"
          for SM in "${SM_LIST[@]}"; do
            SM="$(echo "$SM" | tr -d '[:space:]')"
            if [ -z "${SITE_PROFILE[$SM]+x}" ]; then
              echo "::warning::Unknown supermarket '$SM' — skipping"
              continue
            fi
            ENTRY=$(jq -c -n \
              --arg supermarket "$SM" \
              --arg site_profile "${SITE_PROFILE[$SM]}" \
              --arg default_store "${DEFAULT_STORE[$SM]}" \
              --arg default_url "${DEFAULT_URL[$SM]}" \
              --arg provider "${PROVIDER[$SM]}" \
              '{supermarket: $supermarket, site_profile: $site_profile, default_store: $default_store, default_url: $default_url, provider: $provider}')
            INCLUDES=$(echo "$INCLUDES" | jq -c --argjson entry "$ENTRY" '. + [$entry]')
          done

          MATRIX=$(echo "$INCLUDES" | jq -c '{include: .}')
          MATRIX_COMPACT=$(echo "$MATRIX" | jq -c -S .)
          echo "matrix=${MATRIX_COMPACT}" >> "$GITHUB_OUTPUT"
          echo "Generated matrix: ${MATRIX_COMPACT}"

  scrape:
    name: Scrape ${{ matrix.supermarket }} - ${{ github.event.inputs.category_names }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJson(github.event.inputs.timeout_minutes || '120') }}
    needs: setup
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install firefox
          python -m playwright install-deps firefox

      - name: Determine store name
        id: store_name
        run: |
          # Parse store_names input if provided
          STORE_NAMES_INPUT="${{ github.event.inputs.store_names }}"
          if [ -n "$STORE_NAMES_INPUT" ]; then
            # Convert comma-separated to array
            IFS=',' read -ra STORE_ARRAY <<< "$STORE_NAMES_INPUT"
            # Get store by index based on matrix position
            # Simple approach: use first store for all, or implement more sophisticated mapping
            SELECTED_STORE="${STORE_ARRAY[0]}"
            if [ -n "$SELECTED_STORE" ]; then
              echo "store_name=$SELECTED_STORE" >> $GITHUB_OUTPUT
              echo "Using provided store: $SELECTED_STORE"
              exit 0
            fi
          fi
          
          # Use default store for this supermarket
          echo "store_name=${{ matrix.default_store }}" >> $GITHUB_OUTPUT
          echo "Using default store: ${{ matrix.default_store }}"

      - name: Determine category URL
        id: category_url
        run: |
          CATEGORY_NAME="${{ github.event.inputs.category_names }}"
          SUPERMARKET="${{ matrix.supermarket }}"
          
          # When category is 'all', use the supermarket discovery URL and enable full category enumeration
          if [ "$CATEGORY_NAME" = "all" ]; then
            case "$SUPERMARKET" in
              newworld)
                echo "url=https://www.newworld.co.nz/" >> $GITHUB_OUTPUT
                ;;
              paknsave)
                echo "url=https://www.paknsave.co.nz/" >> $GITHUB_OUTPUT
                ;;
              woolworths)
                echo "url=https://www.woolworths.co.nz/shop" >> $GITHUB_OUTPUT
                ;;
              *)
                echo "url=${{ matrix.default_url }}" >> $GITHUB_OUTPUT
                ;;
            esac
            echo "discover_all_categories=true" >> $GITHUB_OUTPUT
            echo "Scraping ALL categories for $SUPERMARKET"
          else
            # URL mapping based on category name and supermarket
            echo "discover_all_categories=false" >> $GITHUB_OUTPUT
            case "$CATEGORY_NAME" in
              "Beer & Wine"|"Beer and Wine"|"Beer, Wine & Cider")
                case "$SUPERMARKET" in
                  newworld)
                    echo "url=https://www.newworld.co.nz/shop/category/beer-wine-and-cider?pg=1" >> $GITHUB_OUTPUT
                    ;;
                  paknsave)
                    echo "url=https://www.paknsave.co.nz/shop/category/beer-wine-and-cider?pg=1" >> $GITHUB_OUTPUT
                    ;;
                  woolworths)
                    echo "url=https://www.woolworths.co.nz/shop/browse/beer-wine?page=1&size=48" >> $GITHUB_OUTPUT
                    ;;
                  *)
                    echo "url=${{ matrix.default_url }}" >> $GITHUB_OUTPUT
                    ;;
                esac
                ;;
              "Health & Body"|"Health and Body")
                case "$SUPERMARKET" in
                  newworld)
                    echo "url=https://www.newworld.co.nz/shop/category/health-and-body?pg=1" >> $GITHUB_OUTPUT
                    ;;
                  paknsave)
                    echo "url=https://www.paknsave.co.nz/shop/category/health-and-body?pg=1" >> $GITHUB_OUTPUT
                    ;;
                  woolworths)
                    echo "url=https://www.woolworths.co.nz/shop/browse/health-beauty?page=1&size=48" >> $GITHUB_OUTPUT
                    ;;
                  *)
                    echo "url=${{ matrix.default_url }}" >> $GITHUB_OUTPUT
                    ;;
                esac
                ;;
              *)
                # For unknown categories, use default URL for the supermarket
                echo "url=${{ matrix.default_url }}" >> $GITHUB_OUTPUT
                echo "Warning: Using default URL for category '$CATEGORY_NAME'"
                ;;
            esac
          fi
          
          echo "Using URL: $(grep '^url=' $GITHUB_OUTPUT | tail -1 | cut -d= -f2-)"

      - name: Determine max pages parameter
        id: max_pages
        run: |
          NUMBER_OF_PAGES="${{ github.event.inputs.number_of_pages }}"
          if [ "$NUMBER_OF_PAGES" = "all" ]; then
            echo "max_pages=all" >> $GITHUB_OUTPUT
            echo "Scraping all pages (no cap)"
          else
            # Validate it's a number
            if [[ "$NUMBER_OF_PAGES" =~ ^[0-9]+$ ]]; then
              echo "max_pages=$NUMBER_OF_PAGES" >> $GITHUB_OUTPUT
              echo "Scraping $NUMBER_OF_PAGES pages"
            else
              echo "max_pages=3" >> $GITHUB_OUTPUT
              echo "Invalid number_of_pages, defaulting to 3 pages"
            fi
          fi

      - name: Run scraper with automatic provider fallback
        env:
          SCRAPING_PROVIDER_API_KEY: ${{ secrets.SCRAPING_PROVIDER_API_KEY }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          CRAWLBASE_TOKEN: ${{ secrets.CRAWLBASE_TOKEN }}
          ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY }}
          FLOPPYDATA_API_KEY: ${{ secrets.FLOPPYDATA_API_KEY }}
          OXYLABS_API_KEY: ${{ secrets.OXYLABS_API_KEY }}
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUNBUFFERED: '1'
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        run: |
          echo "🚀 Starting scrape for ${{ matrix.supermarket }} - ${{ github.event.inputs.category_names }}"
          echo "📦 Store: ${{ steps.store_name.outputs.store_name }}"
          echo "🔗 URL: ${{ steps.category_url.outputs.url }}"
          echo "📄 Max pages: ${{ steps.max_pages.outputs.max_pages }}"
          echo "⚙️  Provider: ${{ matrix.provider }}"
          
          # Build optional flags
          EXTRA_FLAGS=()
          if [ "${{ steps.category_url.outputs.discover_all_categories }}" = "true" ]; then
            EXTRA_FLAGS+=(--discover-category-urls)
            echo "🗂️  Discovering all categories for ${{ matrix.supermarket }}"
          fi
          
          # Run scraper using the per-supermarket provider.
          # - newworld   → direct (with automatic oxylabs fallback)
          # - paknsave   → direct (with automatic oxylabs fallback on Cloudflare challenge)
          # - woolworths → playwright (headless browser; React SPA needs JS rendering)
          python -u scraper.py \
            --url "${{ steps.category_url.outputs.url }}" \
            --site-profile ${{ matrix.site_profile }} \
            --provider ${{ matrix.provider }} \
            --store-name "${{ steps.store_name.outputs.store_name }}" \
            --max-pages ${{ steps.max_pages.outputs.max_pages }} \
            --limit 100 \
            --crawl-category-pages \
            --output products_${{ matrix.supermarket }}_${{ github.run_id }}.json \
            --price-output price_snapshots_${{ matrix.supermarket }}_${{ github.run_id }}.json \
            --delay-seconds 1.0 \
            --delay-jitter-seconds 0.5 \
            "${EXTRA_FLAGS[@]+"${EXTRA_FLAGS[@]}"}"

      - name: Verify scrape results and write health report
        if: always()
        run: |
          PRODUCTS_FILE="products_${{ matrix.supermarket }}_${{ github.run_id }}.json"
          SNAPSHOTS_FILE="price_snapshots_${{ matrix.supermarket }}_${{ github.run_id }}.json"
          SUPERMARKET="${{ matrix.supermarket }}"
          PROVIDER="${{ matrix.provider }}"
          MAX_PAGES="${{ steps.max_pages.outputs.max_pages }}"

          echo "📊 Verifying scrape results for $SUPERMARKET (provider: $PROVIDER)..."

          if [ -f "$PRODUCTS_FILE" ]; then
            PRODUCT_COUNT=$(python -c "import json,sys; data=json.load(open('$PRODUCTS_FILE')); print(len(data) if isinstance(data,list) else 0)" 2>/dev/null || echo "0")
            echo "   Products scraped: $PRODUCT_COUNT"
          else
            PRODUCT_COUNT=0
            echo "   ⚠️  Products file not found: $PRODUCTS_FILE"
          fi

          if [ -f "$SNAPSHOTS_FILE" ]; then
            SNAPSHOT_COUNT=$(python -c "import json,sys; data=json.load(open('$SNAPSHOTS_FILE')); print(len(data) if isinstance(data,list) else 0)" 2>/dev/null || echo "0")
            echo "   Price snapshots scraped: $SNAPSHOT_COUNT"
          else
            SNAPSHOT_COUNT=0
            echo "   ⚠️  Snapshots file not found: $SNAPSHOTS_FILE"
          fi

          SCRAPE_FAILED=false
          if [ "$PRODUCT_COUNT" = "0" ] && [ "$SNAPSHOT_COUNT" = "0" ]; then
            HEALTH_ICON="❌"
            HEALTH_STATUS="No data scraped — check provider logs for bot-challenge or timeout errors."
            echo "::error::No products or price snapshots were scraped for $SUPERMARKET. Check the 'Run scraper with automatic provider fallback' step logs for details (Cloudflare block, provider error, or timeout)."
            SCRAPE_FAILED=true
          elif [ "$PRODUCT_COUNT" -lt 10 ] 2>/dev/null; then
            HEALTH_ICON="⚠️"
            HEALTH_STATUS="Only $PRODUCT_COUNT product(s) scraped — likely incomplete (homepage fallback, bot challenge, or max-pages cap). Check scraper logs for '--max-pages cap applied' and 'Pagination discovery' lines."
            echo "::warning::Only $PRODUCT_COUNT product(s) scraped for $SUPERMARKET — may be incomplete. Search logs for '--max-pages cap' or 'failed pagination discovery' to diagnose."
          else
            HEALTH_ICON="✅"
            HEALTH_STATUS="Healthy — $PRODUCT_COUNT products and $SNAPSHOT_COUNT price snapshots scraped."
            echo "✅ Scrape results verified: $PRODUCT_COUNT products, $SNAPSHOT_COUNT snapshots"
          fi

          # Write per-job step summary
          {
            echo "## $HEALTH_ICON $SUPERMARKET Scrape Health"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Supermarket | $SUPERMARKET |"
            echo "| Provider | $PROVIDER (+ oxylabs auto-fallback) |"
            echo "| Store | ${{ steps.store_name.outputs.store_name }} |"
            echo "| URL | ${{ steps.category_url.outputs.url }} |"
            echo "| Category mode | ${{ github.event.inputs.category_names }} |"
            echo "| Max pages (total cap) | $MAX_PAGES |"
            echo "| **Products scraped** | **$PRODUCT_COUNT** |"
            echo "| **Price snapshots** | **$SNAPSHOT_COUNT** |"
            echo "| Status | $HEALTH_STATUS |"
            echo ""
            echo "> **Tip:** Search the 'Run scraper' step log for \`[Scraper] Pagination discovery complete\` to see per-provider success/failure counts and total page URLs queued."
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$SCRAPE_FAILED" = "true" ]; then
            exit 1
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results-${{ matrix.supermarket }}-${{ github.run_id }}
          path: |
            products_${{ matrix.supermarket }}_${{ github.run_id }}.json
            price_snapshots_${{ matrix.supermarket }}_${{ github.run_id }}.json
          retention-days: 7

  summary:
    name: Scrape Summary
    runs-on: ubuntu-latest
    needs: [setup, scrape]
    if: always()
    steps:
      - name: Print completion summary
        run: |
          echo "✅ Unified parallel scrape completed!"
          echo ""
          echo "📊 Scraping Summary:"
          echo "   Supermarkets: ${{ github.event.inputs.supermarkets }}"
          echo "   Categories: ${{ github.event.inputs.category_names }}"
          echo "   Pages: ${{ github.event.inputs.number_of_pages }}"
          echo ""
          echo "⚙️  Providers used:"
          echo "   newworld   → direct     (with automatic oxylabs fallback)"
          echo "   paknsave   → direct     (with automatic oxylabs fallback on Cloudflare challenge)"
          echo "   woolworths → playwright (headless browser; renders React SPA for category discovery)"
          echo ""
          echo "💾 Data persisted to PostgreSQL database"
          echo "📦 Per-supermarket artifacts uploaded (retention: 7 days)"
          echo ""
          echo "ℹ️  Check each job's step summary for per-supermarket health details."

      - name: Write overall summary
        run: |
          {
            echo "# 🛒 Unified Scrape Run Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Run ID | ${{ github.run_id }} |"
            echo "| Supermarkets | ${{ github.event.inputs.supermarkets }} |"
            echo "| Categories | ${{ github.event.inputs.category_names }} |"
            echo "| Pages | ${{ github.event.inputs.number_of_pages }} |"
            echo ""
            echo "## Provider strategy"
            echo ""
            echo "| Supermarket | Provider | Reason |"
            echo "|-------------|----------|--------|"
            echo "| newworld | \`direct\` (+ oxylabs fallback) | Standard HTTP works; Oxylabs auto-fallback on bot challenge |"
            echo "| paknsave | \`direct\` (+ oxylabs fallback) | Tries direct first; Oxylabs auto-fallback when Cloudflare blocks |"
            echo "| woolworths | \`playwright\` | React SPA — category links require JavaScript rendering |"
            echo ""
            echo "## Per-supermarket results"
            echo ""
            echo "_See each scrape job's step summary for detailed health tables._"
          } >> "$GITHUB_STEP_SUMMARY"
