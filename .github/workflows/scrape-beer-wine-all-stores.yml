name: Scrape Beer & Wine - All Stores (Playwright → Oxylabs)

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Provider override (playwright or oxylabs)'
        required: false
        default: 'playwright'

jobs:
  scrape-matrix:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - label: New World Karori - Beer & Wine (All pages)
            site_profile: newworld
            url: https://www.newworld.co.nz/shop/category/beer-wine-and-cider?pg=1
            store_name: New World Karori
            artifact_suffix: newworld-karori-all-pages
          
          - label: Woolworths Karori - Beer & Wine (All pages)
            site_profile: woolworths
            url: https://www.woolworths.co.nz/shop/browse/beer-wine?page=1&size=48
            store_name: Karori Woolworths
            artifact_suffix: woolworths-karori-all-pages
          
          - label: PAK'nSAVE Kilbirnie - Beer & Wine (All pages)
            site_profile: paknsave
            url: https://www.paknsave.co.nz/shop/category/beer-wine-and-cider?pg=1
            store_name: PAKn'SAVE Kilbirnie
            artifact_suffix: paknsave-kilbirnie-all-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Try Playwright first
      - name: Install Playwright browsers
        run: |
          python -m playwright install firefox
          python -m playwright install-deps firefox

      - name: Run scraper with Playwright (attempt 1)
        id: playwright_run
        env:
          SCRAPING_PROVIDER_API_KEY: ${{ secrets.SCRAPING_PROVIDER_API_KEY }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          CRAWLBASE_TOKEN: ${{ secrets.CRAWLBASE_TOKEN }}
          ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY }}
          FLOPPYDATA_API_KEY: ${{ secrets.FLOPPYDATA_API_KEY }}
          OXYLABS_API_KEY: ${{ secrets.OXYLABS_API_KEY }}
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        continue-on-error: true
        run: |
          echo "🎯 Starting scrape with Playwright for ${{ matrix.label }}..."
          python scraper.py \
            --url "${{ matrix.url }}" \
            --site-profile ${{ matrix.site_profile }} \
            --provider playwright \
            --store-name "${{ matrix.store_name }}" \
            --persist-db \
            --output products_${{ matrix.artifact_suffix }}.json \
            --price-output price_snapshots_${{ matrix.artifact_suffix }}.json \
            --limit 100 \
            --max-pages 1000
          echo "PLAYWRIGHT_SUCCESS=true" >> $GITHUB_ENV

      # Fallback to Oxylabs if Playwright fails
      - name: Run scraper with Oxylabs (fallback)
        if: ${{ steps.playwright_run.outcome == 'failure' }}
        env:
          SCRAPING_PROVIDER_API_KEY: ${{ secrets.SCRAPING_PROVIDER_API_KEY }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          CRAWLBASE_TOKEN: ${{ secrets.CRAWLBASE_TOKEN }}
          ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY }}
          FLOPPYDATA_API_KEY: ${{ secrets.FLOPPYDATA_API_KEY }}
          OXYLABS_API_KEY: ${{ secrets.OXYLABS_API_KEY }}
          OXYLABS_USERNAME: ${{ secrets.OXYLABS_USERNAME }}
          OXYLABS_PASSWORD: ${{ secrets.OXYLABS_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "⚠️  Playwright failed, falling back to Oxylabs for ${{ matrix.label }}..."
          python scraper.py \
            --url "${{ matrix.url }}" \
            --site-profile ${{ matrix.site_profile }} \
            --provider oxylabs \
            --store-name "${{ matrix.store_name }}" \
            --persist-db \
            --output products_${{ matrix.artifact_suffix }}.json \
            --price-output price_snapshots_${{ matrix.artifact_suffix }}.json \
            --limit 100 \
            --max-pages 1000
          echo "PLAYWRIGHT_SUCCESS=false" >> $GITHUB_ENV

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_suffix }}
          path: |
            products_${{ matrix.artifact_suffix }}.json
            price_snapshots_${{ matrix.artifact_suffix }}.json
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          if [ "$PLAYWRIGHT_SUCCESS" = "true" ]; then
            echo "✅ ${{ matrix.label }} - Completed with Playwright"
          else
            echo "✅ ${{ matrix.label }} - Completed with Oxylabs (Playwright fallback)"
          fi

  completion-summary:
    name: Completion Summary
    runs-on: ubuntu-latest
    needs: scrape-matrix
    if: always()
    steps:
      - name: Summary
        run: |
          echo "✅ Beer & Wine scraping completed for all stores:"
          echo "  1. New World Karori"
          echo "  2. Woolworths Karori"
          echo "  3. PAK'nSAVE Kilbirnie"
          echo ""
          echo "📊 All data persisted to PostgreSQL"
          echo "🔄 Deduplication automatically ran post-scrape"
