name: Test Scraper

'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check scraper help
        run: python scraper.py --help

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run direct-provider smoke scrape
        run: |
          python scraper.py \
            --url "https://httpbin.org/html" \
            --provider direct \
            --product-selector "h1" \
            --name-selector "h1" \
            --price-selector "p" \
            --image-selector "body" \
            --limit 1 \
            --output test_output.json \
            --price-output test_price_snapshots.json \
            --delay-seconds 1

      - name: Verify output files
        run: |
          test -f test_output.json
          test -f test_price_snapshots.json
          echo "Scraper smoke test completed"
